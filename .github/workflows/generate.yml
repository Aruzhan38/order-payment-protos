name: Generate Proto

on:
  push:
    branches: [ "main" ]

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout proto repo
        uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Install protoc
        run: |
          sudo apt update
          sudo apt install -y protobuf-compiler

      - name: Install plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Generate code
        run: |
          mkdir -p generated
          protoc --go_out=generated --go-grpc_out=generated proto/*.proto

      - name: Push to generated repo
        run: |
          git clone https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/Aruzhan38/order-payment-generated.git
          rm -rf order-payment-generated/proto
          mv generated order-payment-generated/proto

          cd order-payment-generated
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Auto-generate proto files"
          git push