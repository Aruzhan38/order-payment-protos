syntax = "proto3";

package order;

option go_package = "github.com/Aruzhan38/order-payment-generated/proto/order;orderpb";

service OrderService {
  rpc SubscribeToOrderUpdates(OrderRequest) returns (stream OrderStatusUpdate);
}

message OrderRequest {
  string order_id = 1;
}

message OrderStatusUpdate {
  string order_id = 1;
  string status = 2;
  string message = 3;
}